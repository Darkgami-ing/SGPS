<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro GPS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        #estado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>Registro de Ubicación GPS</h2>

    <input
        type="text"
        id="dni"
        placeholder="Ingrese su DNI"
        maxlength="8"
    >

    <input
        type="text"
        id="telefono"
        placeholder="Ingrese su teléfono"
        maxlength="9"
    >

    <button onclick="registrarUsuario()">
        Iniciar Seguimiento
    </button>

    <p id="estado">
        Ingrese sus datos para comenzar.
    </p>

    <script>

        window.onload = function () {

            const dni = localStorage.getItem("dni");
            const telefono = localStorage.getItem("telefono");

            if (dni) {
                document.getElementById("dni").value = dni;
            }

            if (telefono) {
                document.getElementById("telefono").value = telefono;
            }

            if (dni && telefono) {
                iniciarSeguimiento();
            }
        };

        function registrarUsuario() {

            const dni = document.getElementById("dni").value.trim();
            const telefono =
                document.getElementById("telefono").value.trim();

            if (dni.length !== 8) {
                alert("Ingrese un DNI válido de 8 dígitos.");
                return;
            }

            if (telefono.length !== 9) {
                alert("Ingrese un teléfono válido de 9 dígitos.");
                return;
            }

            localStorage.setItem("dni", dni);
            localStorage.setItem("telefono", telefono);

            iniciarSeguimiento();
        }

        function iniciarSeguimiento() {

            document.getElementById("estado").innerText =
                "Esperando ubicación...";

            if (!navigator.geolocation) {
                document.getElementById("estado").innerText =
                    "Este dispositivo no soporta GPS.";
                return;
            }

            navigator.geolocation.watchPosition(
                enviarUbicacion,
                mostrarError,
                {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                }
            );
        }

        async function enviarUbicacion(posicion) {

            const datos = {
                dni: localStorage.getItem("dni"),
                telefono: localStorage.getItem("telefono"),
                latitud: posicion.coords.latitude,
                longitud: posicion.coords.longitude,
                precision: posicion.coords.accuracy,
                fecha: new Date().toISOString()
            };

            console.log(datos);

            document.getElementById("estado").innerHTML =
                "📍 Latitud: " + datos.latitud +
                "<br>📍 Longitud: " + datos.longitud +
                "<br>📡 Precisión: " + datos.precision + " m";

            try {

                await fetch(
                    "https://script.google.com/macros/s/TU_URL/exec",
                    {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify(datos)
                    }
                );

            } catch (error) {
                console.error(error);
            }
        }

        function mostrarError(error) {

            switch (error.code) {
                case error.PERMISSION_DENIED:
                    document.getElementById("estado").innerText =
                        "Debe permitir el acceso a la ubicación.";
                    break;

                case error.POSITION_UNAVAILABLE:
                    document.getElementById("estado").innerText =
                        "Ubicación no disponible.";
                    break;

                case error.TIMEOUT:
                    document.getElementById("estado").innerText =
                        "Tiempo de espera agotado.";
                    break;

                default:
                    document.getElementById("estado").innerText =
                        "Error al obtener la ubicación.";
            }
        }

    </script>

</body>
</html>
