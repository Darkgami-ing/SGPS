<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento GPS</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 30px auto;
            padding: 20px;
            text-align: center;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            box-sizing: border-box;
        }

        button {
            cursor: pointer;
        }

        #estado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Seguimiento GPS</h2>

<input
    type="text"
    id="dni"
    placeholder="Ingrese su DNI"
    maxlength="8">

<input
    type="text"
    id="telefono"
    placeholder="Ingrese su teléfono"
    maxlength="9">

<button onclick="registrarUsuario()">
    Iniciar Seguimiento
</button>

<p id="estado">
    Esperando inicio...
</p>

<script>

let temporizador = null;

window.onload = function () {

    const dni = localStorage.getItem("dni");
    const telefono = localStorage.getItem("telefono");

    if (dni) {
        document.getElementById("dni").value = dni;
    }

    if (telefono) {
        document.getElementById("telefono").value = telefono;
    }

    if (dni && telefono) {
        iniciarSeguimiento();
    }
};

function registrarUsuario() {

    const dni = document.getElementById("dni").value.trim();
    const telefono =
        document.getElementById("telefono").value.trim();

    if (dni.length !== 8) {
        alert("Ingrese un DNI válido.");
        return;
    }

    if (telefono.length !== 9) {
        alert("Ingrese un teléfono válido.");
        return;
    }

    localStorage.setItem("dni", dni);
    localStorage.setItem("telefono", telefono);

    iniciarSeguimiento();
}

function iniciarSeguimiento() {

    if (temporizador !== null) {
        return;
    }

    document.getElementById("estado").innerHTML =
        "Seguimiento iniciado.<br>" +
        "Enviando ubicación cada 1 minuto...";

    obtenerYEnviar();

    temporizador = setInterval(
        obtenerYEnviar,
        60000
    );
}

function obtenerYEnviar() {

    navigator.geolocation.getCurrentPosition(
        enviarUbicacion,
        mostrarError,
        {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        }
    );
}

async function enviarUbicacion(posicion) {

    const datos = {
        fecha: new Date().toISOString(),
        dni: localStorage.getItem("dni"),
        telefono: localStorage.getItem("telefono"),
        latitud: posicion.coords.latitude,
        longitud: posicion.coords.longitude,
        precision: posicion.coords.accuracy
    };

    console.log(datos);

    document.getElementById("estado").innerHTML =
        "📍 Última ubicación enviada<br><br>" +
        "Latitud: " + datos.latitud +
        "<br>" +
        "Longitud: " + datos.longitud +
        "<br>" +
        "Precisión: " + datos.precision + " m" +
        "<br><br>" +
        "Próximo envío en 1 minuto.";

    try {

        await fetch(
            "https://script.google.com/macros/s/AKfycbyNNqPPOqlbo30joIrZPp1wSQcqwFKIdepgvOo-cwZVvL3VEaHCmSJxxdDoS0Xl00azbw/exec",
            {
                method: "POST",
                body: JSON.stringify(datos)
            }
        );

    } catch (error) {

        console.error("Error:", error);

    }
}

function mostrarError(error) {

    switch (error.code) {

        case error.PERMISSION_DENIED:
            document.getElementById("estado").innerText =
                "Debe permitir el acceso a la ubicación.";
            break;

        case error.POSITION_UNAVAILABLE:
            document.getElementById("estado").innerText =
                "Ubicación no disponible.";
            break;

        case error.TIMEOUT:
            document.getElementById("estado").innerText =
                "Tiempo de espera agotado.";
            break;

        default:
            document.getElementById("estado").innerText =
                "Error obteniendo la ubicación.";
    }
}

</script>

</body>
</html>
